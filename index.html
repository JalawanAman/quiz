<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#2f67d8" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icon.svg" />
<title>MCQ Practice</title>


<style>
:root {
    --bg-main: #eef3fb;
    --bg-panel: #ffffff;
    --bg-soft: #f6f8fc;
    --text-main: #152238;
    --text-muted: #607089;
    --accent: #2f67d8;
    --accent-strong: #214eaf;
    --border: #d9e2f1;
    --ok-bg: #e9f9ef;
    --ok-border: #9eddba;
    --bad-bg: #fff0ef;
    --bad-border: #f2b8b5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background:
        radial-gradient(circle at 15% 10%, #ffffff 0%, transparent 35%),
        radial-gradient(circle at 85% 0%, #dfeaff 0%, transparent 40%),
        var(--bg-main);
    color: var(--text-main);
    min-height: 100vh;
    padding: 24px;
    padding-bottom: calc(108px + env(safe-area-inset-bottom));
}

.container { max-width: 920px; margin: auto; }

.header {
    text-align: center;
    padding: 28px;
    background: var(--bg-panel);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 12px 32px rgba(30, 58, 110, 0.08);
    margin-bottom: 20px;
}

.header h1 {
    color: var(--text-main);
    font-size: 2.2em;
    margin-bottom: 8px;
    letter-spacing: 0.4px;
}

.header p {
    color: var(--text-muted);
    font-size: 1.02em;
}

.header-controls {
    margin-top: 14px;
    display: flex;
    justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.toggle-btn {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid #c8d9f1;
    background: #e9effa;
    color: #2d4f88;
    font-weight: 700;
    cursor: pointer;
}

.toggle-btn.active {
    background: linear-gradient(135deg, var(--accent-strong), var(--accent));
    border-color: var(--accent-strong);
    color: #fff;
}

.help-btn {
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid #c8d9f1;
  background: #f4f8ff;
  color: #2d4f88;
  font-weight: 700;
  cursor: pointer;
}

.install-help-modal {
  position: fixed;
  inset: 0;
  background: rgba(15, 27, 49, 0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1300;
  padding: 16px;
}

.install-help-box {
  width: min(560px, 100%);
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 22px 44px rgba(18, 40, 80, 0.2);
}

.install-help-box h3 {
  margin-bottom: 8px;
  color: var(--text-main);
}

.install-help-box p {
  color: var(--text-muted);
  margin-bottom: 10px;
  line-height: 1.45;
}

.install-help-box ul {
  margin: 0 0 12px 18px;
  line-height: 1.5;
  color: var(--text-main);
}

.install-help-actions {
  display: flex;
  justify-content: flex-end;
}

.progress-bar {
    height: 18px;
    background: #dfe6f4;
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 15px;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #59a4ff);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: 0.82rem;
    transition: width 0.25s ease;
}

.result-strip {
    display: none;
    margin-bottom: 15px;
  padding: 16px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
  min-height: 142px;
  text-align: left;
    font-weight: 700;
    box-shadow: 0 8px 20px rgba(35, 71, 137, 0.06);
}

.result-strip-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.result-strip-card {
  background: #f4f8ff;
  border: 1px solid #c7d7f0;
  border-radius: 10px;
  padding: 12px 14px;
}

.result-strip-label {
  color: var(--text-muted);
  font-size: 0.8rem;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: 0.2px;
}

.result-strip-value {
  color: var(--text-main);
  font-size: 1.04rem;
  font-weight: 800;
}

.question-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 14px;
    box-shadow: 0 10px 24px rgba(28, 60, 116, 0.07);
}

.question-number {
    color: var(--accent-strong);
    font-weight: 700;
    margin-bottom: 10px;
}

.question-text {
    font-size: 1.15em;
    margin-bottom: 20px;
    line-height: 1.45;
}

.explanation-box {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 0.95em;
    line-height: 1.55;
}

.explanation-correct {
    background: var(--ok-bg);
    border: 1px solid var(--ok-border);
}

.explanation-wrong {
    background: var(--bad-bg);
    border: 1px solid var(--bad-border);
}

.explanation-title {
    font-weight: 700;
    margin-bottom: 6px;
}

.options { display: flex; flex-direction: column; gap: 12px; }

.option {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    gap: 12px;
    transition: all 0.2s ease;
}

.option:hover {
    border-color: #b9cae8;
    transform: translateY(-1px);
}

.option.selected {
  border: 2px solid var(--accent);
  background: #e4efff;
  box-shadow: 0 0 0 1px rgba(47, 103, 216, 0.2);
}

.option.correct {
  background: #ddf5e8;
  border: 2px solid #7ecaa1;
  box-shadow: 0 0 0 1px rgba(126, 202, 161, 0.24);
}

.option.incorrect {
  background: #ffe7e6;
  border: 2px solid #e39f9c;
  box-shadow: 0 0 0 1px rgba(227, 159, 156, 0.24);
}

.option.selected .option-label {
  background: #cfdfff;
  color: #1e448d;
}

.option.correct .option-label {
  background: #ccefdc;
  color: #215e3c;
}

.option.incorrect .option-label {
  background: #ffd8d6;
  color: #8f2f2f;
}

.option-label {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #d9e5fa;
    color: #24498f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
}

.question-navigator {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px 12px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
  margin-top: 16px;
  margin-bottom: 86px;
}

.q-nav-main {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: space-between;
}

.q-nav-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.q-nav-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}

.q-nav-badge {
  background: #edf4ff;
  color: #22498f;
  border: 1px solid #cfe0fb;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 0.82rem;
  font-weight: 700;
  white-space: nowrap;
}

.q-nav-meta {
  font-size: 0.78rem;
  color: var(--text-muted);
  white-space: nowrap;
}

.q-nav-btn {
  width: 34px;
  height: 34px;
  padding: 0;
  border-radius: 8px;
  border: 1px solid #c8d9f1;
  background: #e9effa;
  color: #2d4f88;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
}

.q-nav-input {
  width: 72px;
  height: 34px;
  padding: 0 8px;
  border-radius: 8px;
  border: 1px solid #c8d9f1;
  background: #f8fbff;
  color: #2d4f88;
  font-weight: 700;
  text-align: center;
}

.q-nav-go {
  min-width: 42px;
  height: 34px;
  padding: 0 10px;
  border-radius: 8px;
  border: 1px solid var(--accent-strong);
  background: linear-gradient(135deg, var(--accent-strong), var(--accent));
  color: #fff;
  font-weight: 700;
  cursor: pointer;
}

.q-nav-error {
  min-height: 14px;
  font-size: 0.74rem;
  color: #c54747;
}

.q-nav-rail {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  overflow-y: hidden;
  padding-bottom: 2px;
  scrollbar-width: thin;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x;
}

.q-nav-item {
  width: 34px;
  height: 34px;
  background: #eef3fb;
  border: 1px solid #ccdaef;
  border-radius: 999px;
  font-size: 0.75em;
  color: #44608f;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-weight: 700;
    flex: 0 0 auto;
}

.q-nav-item.answered { background: #ddeafe; }
.q-nav-item.current { background: var(--accent); color: #fff; border-color: var(--accent); }
.q-nav-item.review-correct { background: var(--ok-bg); border-color: var(--ok-border); }
.q-nav-item.review-wrong { background: var(--bad-bg); border-color: var(--bad-border); }

.navigation {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(8px);
  padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 12px;
  flex-wrap: wrap;
  z-index: 1200;
}

.btn {
    padding: 10px 22px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
    cursor: pointer;
  min-height: 42px;
  touch-action: manipulation;
}

.btn-primary {
    background: linear-gradient(135deg, var(--accent-strong), var(--accent));
    color: white;
}

.btn-secondary {
    background: #e9effa;
    color: #2d4f88;
    border: 1px solid #c8d9f1;
}

.results {
    position: fixed;
    inset: 0;
    background: rgba(15, 27, 49, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.results .box {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 15px;
    padding: 34px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(25, 51, 96, 0.22);
}

.score-display {
    font-size: 3.5em;
    color: var(--accent-strong);
    margin: 16px 0;
    font-weight: 800;
}

.stats {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 12px;
}

.stat-card {
    background: #f6f9ff;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #dfe9f8;
}

.stat-value { font-size: 1.8em; color: var(--accent-strong); font-weight: 800; }
.stat-label { color: var(--text-muted); font-weight: 600; }

@media (max-width: 640px) {
  body {
    padding: 14px;
    padding-bottom: calc(136px + env(safe-area-inset-bottom));
  }
    .header h1 { font-size: 1.7em; }
    .question-card { padding: 16px; }
  .question-text { font-size: 1.04em; }
  .navigation {
    gap: 8px;
    justify-content: space-between;
  }
  .btn {
    padding: 10px 14px;
    font-size: 0.9rem;
    flex: 1 1 calc(50% - 8px);
  }
  .q-nav-main {
    gap: 6px;
    flex-wrap: wrap;
  }
  .q-nav-left { width: 100%; justify-content: space-between; }
  .q-nav-meta { display: none; }
  .q-nav-controls { width: 100%; }
  .q-nav-input {
    width: 64px;
    font-size: 16px;
  }
  .q-nav-go { min-width: 48px; }
  .result-strip-grid { gap: 10px; }
  .result-strip-card { padding: 10px; }
  .result-strip-value { font-size: 0.94rem; }
  .install-help-box {
    padding: 16px;
    border-radius: 12px;
  }
}
</style>
</head>

<body>
<div class="container">

<div class="header">
    <h1>SE Midterm Quiz</h1>
    <p>:)</p>
    <div class="header-controls">
        <button class="toggle-btn" id="shuffleToggle" onclick="toggleShuffle()">Shuffle: OFF</button>
    <button class="help-btn" type="button" onclick="openInstallHelpModal()">Install Help</button>
    </div>
</div>

<div class="progress-bar">
    <div class="progress-fill" id="progressBar">0/0</div>
</div>

<div class="result-strip" id="resultStrip"></div>

<div id="quizContainer"></div>
<div class="question-navigator" id="questionNavigator"></div>

<div class="navigation">
    <button class="btn btn-secondary" onclick="previousQuestion()">Previous</button>
    <button class="btn btn-primary" onclick="nextQuestion()">Next</button>
    <button class="btn btn-primary" id="submitBtn" onclick="submitTest()">Submit</button>
    <button class="btn btn-secondary" id="retakeBtn" onclick="location.reload()" style="display:none;">Retake</button>
</div>

</div>

<!-- OLD RESULT MODAL -->
<div class="results" id="results">
    <div class="box" id="resultsBox"></div>
</div>

<div class="install-help-modal" id="installHelpModal" role="dialog" aria-modal="true" aria-labelledby="installHelpTitle">
  <div class="install-help-box">
    <h3 id="installHelpTitle">Add To Home Screen</h3>
    <p>Install support depends on browser and platform. Use the steps below for the best result.</p>
    <ul>
      <li>iPhone (Safari): Tap Share, then Add to Home Screen.</li>
      <li>Android (Chrome): Tap menu, then Install app or Add to Home Screen.</li>
      
    </ul>
    <div class="install-help-actions">
      <button class="btn btn-secondary" type="button" onclick="closeInstallHelpModal()">Close</button>
    </div>
  </div>
</div>

<script>
/* ===== DATA (REPLACE THIS ONLY) ===== */
const rawQuestions = [
  {
    "question": "In a file-based system, two departments maintain separate files for customer data. What is a major drawback of this approach?",
    "options": [
      "Data redundancy causing inconsistent updates",
      "Centralized control over data access",
      "Automatic synchronization of data between files",
      "Uniform file formats across departments"
    ],
    "correct": 0,
    "why": "File-based systems often lead to data duplication because each department manages its own files, causing redundancy and potential inconsistency. Centralized control and synchronization are features of database systems, not file-based systems. Different departments typically use incompatible file formats, not uniform ones."
  },
  {
    "question": "Which type of data best describes a collection of customer emails stored as plain text without a fixed format?",
    "options": [
      "Unstructured data",
      "Structured data",
      "Semi-structured data",
      "Metadata"
    ],
    "correct": 0,
    "why": "Unstructured data lacks a predefined format, such as plain text emails. Structured data has a strict schema like tables, and semi-structured data has some organization like XML. Metadata describes data properties, not the data itself."
  },
  {
    "question": "Metadata in a database system primarily helps users to:",
    "options": [
      "Understand the meaning and structure of stored data",
      "Store large volumes of raw data efficiently",
      "Automatically generate reports from data",
      "Encrypt sensitive data for security"
    ],
    "correct": 0,
    "why": "Metadata provides information about data, such as its meaning and structure, enabling users and designers to interpret it correctly. It does not handle data storage efficiency, report generation, or encryption directly."
  },
  {
    "question": "A contracts department uses a file-based system where each program accesses its own data files. What happens if a new report requires data from both sales and contracts files?",
    "options": [
      "A new program must be written to combine data manually",
      "The existing programs automatically share data",
      "Data is centrally accessible without modification",
      "The system merges files without user intervention"
    ],
    "correct": 0,
    "why": "In file-based systems, data is isolated per program; combining data from multiple files requires writing new programs. Automatic sharing or central access is a feature of database systems, not file-based ones."
  },
  {
    "question": "Given the table Properties(property_id, owner_name, price), what is the effect of executing DELETE FROM Properties without a WHERE clause?",
    "options": [
      "All rows in Properties are removed, but table structure remains",
      "Table Properties is dropped entirely from the database",
      "Only rows with NULL values are deleted",
      "No rows are deleted without WHERE clause"
    ],
    "correct": 0,
    "why": "DELETE without WHERE removes all rows but keeps the table structure intact. DROP removes the table itself. Rows with NULL are not selectively deleted without a condition. DELETE always affects rows unless restricted."
  },
  {
    "question": "Consider two tables: Clients(client_id, name) and Leases(lease_id, client_id, property_id). Which SQL query returns all clients including those without leases?",
    "options": [
      "SELECT * FROM Clients LEFT JOIN Leases ON Clients.client_id = Leases.client_id",
      "SELECT * FROM Clients INNER JOIN Leases ON Clients.client_id = Leases.client_id",
      "SELECT * FROM Leases LEFT JOIN Clients ON Leases.client_id = Clients.client_id",
      "SELECT * FROM Clients RIGHT JOIN Leases ON Clients.client_id = Leases.client_id"
    ],
    "correct": 0,
    "why": "LEFT JOIN from Clients to Leases returns all clients, even those without leases (NULLs in Leases). INNER JOIN excludes clients without leases. RIGHT JOIN would return all leases, not clients. The third option reverses tables and would not return all clients."
  },
  {
    "question": "In a property rental database, which key is best suited to uniquely identify each lease record?",
    "options": [
      "A surrogate key like lease_id with AUTO_INCREMENT",
      "Owner's name combined with property address",
      "Client's phone number",
      "Property type"
    ],
    "correct": 0,
    "why": "A surrogate key such as lease_id with AUTO_INCREMENT uniquely identifies each lease record reliably. Owner's name and address may not be unique or stable. Phone number and property type are not unique identifiers."
  },
  {
    "question": "Which is a key advantage of a 3-tier database architecture over a 2-tier architecture?",
    "options": [
      "Improved scalability by separating client, application, and database layers",
      "Simpler design with fewer components",
      "Direct client access to database files",
      "No need for application servers"
    ],
    "correct": 0,
    "why": "3-tier architecture separates client, application, and database layers, improving scalability and maintainability. 2-tier is simpler but less scalable. Direct client access and no application servers are characteristics of 2-tier, not 3-tier."
  },
  {
    "question": "Given the SQL: SELECT client_id FROM Clients WHERE client_id NOT IN (SELECT client_id FROM Leases); What does this query return?",
    "options": [
      "Clients who have no lease records",
      "Clients who have at least one lease",
      "All client_ids from both tables",
      "An error due to subquery"
    ],
    "correct": 0,
    "why": "The query returns client_ids from Clients that do not appear in Leases, i.e., clients without leases. It does not return clients with leases or all clients. The subquery is valid and does not cause an error."
  },
  {
    "question": "Which statement best distinguishes data from information?",
    "options": [
      "Data are raw facts; information is processed and meaningful",
      "Data is always numeric; information is textual",
      "Information is stored in files; data is stored in databases",
      "Data and information are interchangeable terms"
    ],
    "correct": 0,
    "why": "Data consists of raw, unprocessed facts, while information is data that has been processed to provide meaning. Data is not limited to numeric types, and both data and information can be stored in databases or files. They are not interchangeable."
  },
  {
    "question": "Which DBMS component is responsible for enforcing access permissions and preventing unauthorized data retrieval?",
    "options": [
      "Security and Integrity Module",
      "Data Definition Language Processor",
      "Query Optimizer",
      "Recovery Manager"
    ],
    "correct": 0,
    "why": "The Security and Integrity Module controls access rights to data, ensuring only authorized users can retrieve or modify data. The Data Definition Language Processor only defines schema structures, not access control. Query Optimizer improves query execution but does not handle security. Recovery Manager deals with restoring data after failures."
  },
  {
    "question": "Consider the SQL statement: DELETE FROM Orders; What is the effect of executing this without a WHERE clause?",
    "options": [
      "All rows in Orders are removed, but table structure remains",
      "Table Orders is dropped from the database",
      "Only rows matching default conditions are deleted",
      "Table Orders is truncated, resetting identity counters"
    ],
    "correct": 0,
    "why": "DELETE without WHERE removes all rows but keeps the table and its structure intact. DROP removes the entire table, which is not the case here. There is no default condition filtering rows in DELETE. TRUNCATE is a different command that resets storage and identity counters."
  },
  {
    "question": "In a hospital database, a Patient entity has a multivalued attribute 'Allergies'. Which design choice best represents this in a relational schema?",
    "options": [
      "Create a separate Allergies table linked by PatientID",
      "Store all allergies as a comma-separated string in Patient table",
      "Add multiple Allergy1, Allergy2 columns in Patient table",
      "Use a derived attribute to compute allergies from visits"
    ],
    "correct": 0,
    "why": "Multivalued attributes should be represented by a separate table to maintain normalization and allow multiple allergy entries per patient. Storing comma-separated values or multiple columns violates normalization. Derived attributes are computed, not stored multivalued data."
  },
  {
    "question": "Which role in the DBMS environment is primarily responsible for defining data standards and policies across an organization?",
    "options": [
      "Data Administrator",
      "Database Administrator",
      "Application Developer",
      "End-User"
    ],
    "correct": 0,
    "why": "Data Administrators focus on data policies, standards, and planning. Database Administrators handle physical implementation and security. Application Developers build programs interacting with the database. End-Users consume data but do not define standards."
  },
  {
    "question": "Given the SQL query: SELECT e.Name, d.DeptName FROM Employee e LEFT JOIN Department d ON e.DeptID = d.DeptID WHERE d.DeptName IS NOT NULL; What is the effective join type performed?",
    "options": [
      "Equivalent to INNER JOIN",
      "Retains all employees regardless of department",
      "Returns all departments even without employees",
      "Produces a Cartesian product of Employee and Department"
    ],
    "correct": 0,
    "why": "Filtering LEFT JOIN results with WHERE d.DeptName IS NOT NULL removes rows where no matching department exists, effectively converting it to an INNER JOIN. The query no longer retains employees without departments. It does not return all departments or produce a Cartesian product."
  },
  {
    "question": "Which of the following best illustrates physical data independence in a DBMS?",
    "options": [
      "Changing file storage method without affecting application queries",
      "Adding a new attribute to a table without changing schema",
      "Modifying a query to include a new join condition",
      "Changing user views without altering the base tables"
    ],
    "correct": 0,
    "why": "Physical data independence means changes in physical storage (e.g., file organization) do not impact application-level queries. Adding attributes affects logical schema, modifying queries changes application logic, and changing user views relates to logical independence."

/* ===== PREP + SHUFFLE ===== */
function cloneQuestionSet(source){
    return source.map(q => ({
        question: q.question,
        options: [...q.options],
        correct: q.correct,
        why: q.why
    }));
}

function shuffleArray(arr){
    const out = [...arr];
    for(let i = out.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [out[i], out[j]] = [out[j], out[i]];
    }
    return out;
}

  function shuffleQuestionOptions(question){
    const optionPairs = question.options.map((text, index) => ({ text, index }));
    const shuffledPairs = shuffleArray(optionPairs);
    return {
      question: question.question,
      options: shuffledPairs.map(pair => pair.text),
      correct: shuffledPairs.findIndex(pair => pair.index === question.correct),
      why: question.why
    };
  }

  function prepareQuestions(){
    const questionOrder = shuffleEnabled
      ? shuffleArray(cloneQuestionSet(originalQuestions))
      : cloneQuestionSet(originalQuestions);
    return questionOrder.map(shuffleQuestionOptions);
  }

let shuffleEnabled = false;
const originalQuestions = cloneQuestionSet(rawQuestions);
let questions = prepareQuestions();

let currentQuestion = 0;
let userAnswers = Array(questions.length).fill(null);
let testSubmitted = false;

function updateShuffleToggleUI(){
    const btn = document.getElementById("shuffleToggle");
    if(!btn) return;
    btn.textContent = `Shuffle: ${shuffleEnabled ? "ON" : "OFF"}`;
    btn.classList.toggle("active", shuffleEnabled);
}

function resetQuizState(){
  questions = prepareQuestions();
    currentQuestion = 0;
    userAnswers = Array(questions.length).fill(null);
    testSubmitted = false;

    const strip = document.getElementById("resultStrip");
    strip.style.display = "none";
    strip.innerHTML = "";

    const modal = document.getElementById("results");
    modal.style.display = "none";

    const submitBtn = document.getElementById("submitBtn");
    if(submitBtn) submitBtn.style.display = "inline-block";
    document.getElementById("retakeBtn").style.display = "none";

    updateShuffleToggleUI();
    renderAll();
}

function toggleShuffle(){
    const nextState = !shuffleEnabled;
    const hasProgress = userAnswers.some(a => a !== null) || testSubmitted;

    if(hasProgress){
        const ok = confirm("Changing shuffle will reset this attempt. Continue?");
        if(!ok) return;
    }

    shuffleEnabled = nextState;
    resetQuizState();
}

/* ===== RENDER ===== */
function renderAll(){
    renderQuestion();
    renderNavigator();
    updateProgress();
}

function renderQuestion(){
    const q = questions[currentQuestion];
    let html = `<div class="question-card">
        <div class="question-number">Question ${currentQuestion+1} of ${questions.length}</div>
        <div class="question-text">${q.question}</div>
        <div class="options">`;

    q.options.forEach((opt,i)=>{
        let cls = "";
        if(userAnswers[currentQuestion] === i) cls += " selected";
        if(testSubmitted){
            if(i === q.correct) cls = " correct";
            else if(userAnswers[currentQuestion] === i) cls = " incorrect";
        }
        html += `<div class="option${cls}" onclick="selectOption(${i})">
            <div class="option-label">${String.fromCharCode(65+i)}</div>
            <div>${opt}</div>
        </div>`;
    });

    html += `</div></div>`;
    // Explanation (after submit)
    if (testSubmitted) {
        const userAnswer = userAnswers[currentQuestion];
        const isCorrect = userAnswer === q.correct;

        const explanationClass = isCorrect
            ? "explanation-correct"
            : "explanation-wrong";

        html += `
            <div class="explanation-box ${explanationClass}">
                <div class="explanation-title">
                    ${isCorrect ? "Why this is correct" : "Concept explanation"}
                </div>
                <div>${q.why}</div>
            </div>
        `;
    }

    document.getElementById("quizContainer").innerHTML = html;
}

function renderNavigator(){
    const nav = document.getElementById("questionNavigator");
    const answeredCount = userAnswers.filter(a => a !== null).length;
    let railHtml = "";

    questions.forEach((_, i) => {
        let cls = "q-nav-item";
        if(testSubmitted){
            if(userAnswers[i] === questions[i].correct) cls += " review-correct";
            else cls += " review-wrong";
        } else if(userAnswers[i] !== null) {
            cls += " answered";
        }
        if(i === currentQuestion) cls += " current";
        railHtml += `<button class="${cls}" onclick="goToQuestion(${i})" title="Question ${i + 1}" type="button">${i + 1}</button>`;
    });

    nav.innerHTML = `
        <div class="q-nav-main">
        <div class="q-nav-left">
          <span class="q-nav-badge">Q ${currentQuestion + 1}/${questions.length}</span>
          <span class="q-nav-meta">Answered ${answeredCount}</span>
        </div>
        <div class="q-nav-controls">
          <input id="qJumpInput" class="q-nav-input" type="number" min="1" max="${questions.length}" value="${currentQuestion + 1}" onkeydown="handleJumpInputKey(event)" oninput="clearJumpError()" aria-label="Jump to question" />
          <button type="button" class="q-nav-go" onclick="jumpToInputQuestion()">Go</button>
                <button type="button" class="q-nav-btn" onclick="scrollNavigator(-1)" title="Scroll left">&#10094;</button>
                <button type="button" class="q-nav-btn" onclick="scrollNavigator(1)" title="Scroll right">&#10095;</button>
            </div>
        </div>
      <div id="qNavError" class="q-nav-error"></div>
        <div id="qNavRail" class="q-nav-rail">${railHtml}</div>
    `;

    const currentBtn = nav.querySelector(".q-nav-item.current");
    if(currentBtn){
        currentBtn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    }
}

function clearJumpError(){
  const errorEl = document.getElementById("qNavError");
  if(errorEl) errorEl.textContent = "";
}

function handleJumpInputKey(event){
  if(event.key === "Enter"){
    jumpToInputQuestion();
  }
}

function jumpToInputQuestion(){
  const input = document.getElementById("qJumpInput");
  const errorEl = document.getElementById("qNavError");
  if(!input || !errorEl) return;

  const value = Number(input.value);
  if(!Number.isInteger(value) || value < 1 || value > questions.length){
    errorEl.textContent = `Enter a number between 1 and ${questions.length}.`;
    input.focus();
    return;
  }

  errorEl.textContent = "";
  goToQuestion(value - 1);
}

function goToQuestion(index){
  currentQuestion = index;
  renderAll();
}

function scrollNavigator(direction){
    const rail = document.getElementById("qNavRail");
    if(!rail) return;
    rail.scrollBy({ left: direction * 180, behavior: "smooth" });
}

function updateProgress(){
    const answered = userAnswers.filter(a=>a!==null).length;
    const pct = Math.round((answered / questions.length) * 100);
    const bar = document.getElementById("progressBar");
    bar.style.width = pct + "%";
    bar.textContent = `${answered}/${questions.length}`;
}

/* ===== ACTIONS ===== */
function selectOption(i){
    if(testSubmitted) return;
    userAnswers[currentQuestion] = i;
    renderAll();
}
function nextQuestion(){
    if(currentQuestion < questions.length-1){
        currentQuestion++;
        renderAll();
    }
}
function previousQuestion(){
    if(currentQuestion > 0){
        currentQuestion--;
        renderAll();
    }
}

function submitTest(){
    const unansweredBeforeSubmit = userAnswers.filter(a=>a===null).length;
    if(unansweredBeforeSubmit > 0){
        if(!confirm(`You still have ${unansweredBeforeSubmit} unanswered question(s). Submit anyway?`)) return;
    } else {
        if(!confirm("Submit test?")) return;
    }

    testSubmitted = true;
    const submitBtn = document.getElementById("submitBtn");
    if(submitBtn) submitBtn.style.display = "none";

    let correct = 0;
    userAnswers.forEach((a,i)=>{ if(a === questions[i].correct) correct++; });
    const answered = userAnswers.filter(a=>a!==null).length;
    const unanswered = userAnswers.filter(a=>a===null).length;
    const incorrect = answered - correct;
    const totalPercent = ((correct / questions.length) * 100).toFixed(1);
    const answeredPercent = answered > 0 ? ((correct / answered) * 100).toFixed(1) : "0.0";

    // SHOW OLD RESULT MODAL
    const modal = document.getElementById("results");
    const box = document.getElementById("resultsBox");
    box.innerHTML = `
        <h2>Test Results</h2>
      <div class="score-display">${totalPercent}%</div>
      <p style="margin-top:-6px;color:var(--text-muted);font-weight:600;">Attempted Score: ${answeredPercent}% (${correct}/${answered})</p>
        <div class="stats">
            <div class="stat-card"><div class="stat-value">${correct}</div><div class="stat-label">Correct</div></div>
        <div class="stat-card"><div class="stat-value">${incorrect}</div><div class="stat-label">Incorrect</div></div>
            <div class="stat-card"><div class="stat-value">${unanswered}</div><div class="stat-label">Unanswered</div></div>
            <div class="stat-card"><div class="stat-value">${questions.length}</div><div class="stat-label">Total</div></div>
        </div>`;
    modal.style.display = "flex";

    setTimeout(()=>{
        modal.style.display = "none";

        // REVIEW MODE STRIP
        const strip = document.getElementById("resultStrip");
        strip.innerHTML = `
          <div class="result-strip-grid">
            <div class="result-strip-card">
              <div class="result-strip-label">Total Score</div>
              <div class="result-strip-value">${totalPercent}% (${correct}/${questions.length})</div>
            </div>
            <div class="result-strip-card">
              <div class="result-strip-label">Attempted Score</div>
              <div class="result-strip-value">${answeredPercent}% (${correct}/${answered})</div>
            </div>
            <div class="result-strip-card">
              <div class="result-strip-label">Correct</div>
              <div class="result-strip-value">${correct}</div>
            </div>
            <div class="result-strip-card">
              <div class="result-strip-label">Incorrect</div>
              <div class="result-strip-value">${incorrect}</div>
            </div>
          </div>
        `;
        strip.style.display = "block";
        document.getElementById("retakeBtn").style.display = "inline-block";

        renderAll();
    }, 3000);
}

  function openInstallHelpModal(){
    const modal = document.getElementById("installHelpModal");
    if(modal) modal.style.display = "flex";
  }

  function closeInstallHelpModal(){
    const modal = document.getElementById("installHelpModal");
    if(modal) modal.style.display = "none";
  }

  document.addEventListener("keydown", (e) => {
    if(e.key === "Escape") closeInstallHelpModal();
  });

  document.addEventListener("click", (e) => {
    const modal = document.getElementById("installHelpModal");
    if(modal && e.target === modal) closeInstallHelpModal();
  });

/* INIT */
updateShuffleToggleUI();
renderAll();
</script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
}
</script>
