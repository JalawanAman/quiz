<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#2f67d8" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icon.svg" />
<title>MCQ Practice</title>


<style>
:root {
    --bg-main: #eef3fb;
    --bg-panel: #ffffff;
    --bg-soft: #f6f8fc;
    --text-main: #152238;
    --text-muted: #607089;
    --accent: #2f67d8;
    --accent-strong: #214eaf;
    --border: #d9e2f1;
    --ok-bg: #e9f9ef;
    --ok-border: #9eddba;
    --bad-bg: #fff0ef;
    --bad-border: #f2b8b5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background:
        radial-gradient(circle at 15% 10%, #ffffff 0%, transparent 35%),
        radial-gradient(circle at 85% 0%, #dfeaff 0%, transparent 40%),
        var(--bg-main);
    color: var(--text-main);
    min-height: 100vh;
    padding: 24px;
    padding-bottom: calc(108px + env(safe-area-inset-bottom));
}

.container { max-width: 920px; margin: auto; }

.header {
    text-align: center;
    padding: 28px;
    background: var(--bg-panel);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 12px 32px rgba(30, 58, 110, 0.08);
    margin-bottom: 20px;
}

.header h1 {
    color: var(--text-main);
    font-size: 2.2em;
    margin-bottom: 8px;
    letter-spacing: 0.4px;
}

.header p {
    color: var(--text-muted);
    font-size: 1.02em;
}

.header-controls {
    margin-top: 14px;
    display: flex;
    justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.toggle-btn {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid #c8d9f1;
    background: #e9effa;
    color: #2d4f88;
    font-weight: 700;
    cursor: pointer;
}

.toggle-btn.active {
    background: linear-gradient(135deg, var(--accent-strong), var(--accent));
    border-color: var(--accent-strong);
    color: #fff;
}

.help-btn {
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid #c8d9f1;
  background: #f4f8ff;
  color: #2d4f88;
  font-weight: 700;
  cursor: pointer;
}

.install-help-modal {
  position: fixed;
  inset: 0;
  background: rgba(15, 27, 49, 0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1300;
  padding: 16px;
}

.install-help-box {
  width: min(560px, 100%);
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 22px 44px rgba(18, 40, 80, 0.2);
}

.install-help-box h3 {
  margin-bottom: 8px;
  color: var(--text-main);
}

.install-help-box p {
  color: var(--text-muted);
  margin-bottom: 10px;
  line-height: 1.45;
}

.install-help-box ul {
  margin: 0 0 12px 18px;
  line-height: 1.5;
  color: var(--text-main);
}

.install-help-actions {
  display: flex;
  justify-content: flex-end;
}

.progress-bar {
    height: 18px;
    background: #dfe6f4;
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 15px;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #59a4ff);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: 0.82rem;
    transition: width 0.25s ease;
}

.result-strip {
    display: none;
    margin-bottom: 15px;
    padding: 12px 14px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-align: center;
    font-weight: 700;
    box-shadow: 0 8px 20px rgba(35, 71, 137, 0.06);
}

.result-strip span {
    margin: 0 10px;
    color: var(--text-main);
}

.question-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 14px;
    box-shadow: 0 10px 24px rgba(28, 60, 116, 0.07);
}

.question-number {
    color: var(--accent-strong);
    font-weight: 700;
    margin-bottom: 10px;
}

.question-text {
    font-size: 1.15em;
    margin-bottom: 20px;
    line-height: 1.45;
}

.explanation-box {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 0.95em;
    line-height: 1.55;
}

.explanation-correct {
    background: var(--ok-bg);
    border: 1px solid var(--ok-border);
}

.explanation-wrong {
    background: var(--bad-bg);
    border: 1px solid var(--bad-border);
}

.explanation-title {
    font-weight: 700;
    margin-bottom: 6px;
}

.options { display: flex; flex-direction: column; gap: 12px; }

.option {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    gap: 12px;
    transition: all 0.2s ease;
}

.option:hover {
    border-color: #b9cae8;
    transform: translateY(-1px);
}

.option.selected {
    border-color: var(--accent);
    background: #edf4ff;
}

.option.correct {
    background: var(--ok-bg);
    border-color: var(--ok-border);
}

.option.incorrect {
    background: var(--bad-bg);
    border-color: var(--bad-border);
}

.option-label {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #d9e5fa;
    color: #24498f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
}

.question-navigator {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 10px 12px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
  margin-top: 16px;
  margin-bottom: 86px;
}

.q-nav-main {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: space-between;
}

.q-nav-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.q-nav-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}

.q-nav-badge {
  background: #edf4ff;
  color: #22498f;
  border: 1px solid #cfe0fb;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 0.82rem;
  font-weight: 700;
  white-space: nowrap;
}

.q-nav-meta {
  font-size: 0.78rem;
  color: var(--text-muted);
  white-space: nowrap;
}

.q-nav-btn {
  width: 34px;
  height: 34px;
  padding: 0;
  border-radius: 8px;
  border: 1px solid #c8d9f1;
  background: #e9effa;
  color: #2d4f88;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
}

.q-nav-input {
  width: 72px;
  height: 34px;
  padding: 0 8px;
  border-radius: 8px;
  border: 1px solid #c8d9f1;
  background: #f8fbff;
  color: #2d4f88;
  font-weight: 700;
  text-align: center;
}

.q-nav-go {
  min-width: 42px;
  height: 34px;
  padding: 0 10px;
  border-radius: 8px;
  border: 1px solid var(--accent-strong);
  background: linear-gradient(135deg, var(--accent-strong), var(--accent));
  color: #fff;
  font-weight: 700;
  cursor: pointer;
}

.q-nav-error {
  min-height: 14px;
  font-size: 0.74rem;
  color: #c54747;
}

.q-nav-rail {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  overflow-y: hidden;
  padding-bottom: 2px;
  scrollbar-width: thin;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x;
}

.q-nav-item {
  width: 34px;
  height: 34px;
  background: #eef3fb;
  border: 1px solid #ccdaef;
  border-radius: 999px;
  font-size: 0.75em;
  color: #44608f;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-weight: 700;
    flex: 0 0 auto;
}

.q-nav-item.answered { background: #ddeafe; }
.q-nav-item.current { background: var(--accent); color: #fff; border-color: var(--accent); }
.q-nav-item.review-correct { background: var(--ok-bg); border-color: var(--ok-border); }
.q-nav-item.review-wrong { background: var(--bad-bg); border-color: var(--bad-border); }

.navigation {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(8px);
  padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 12px;
  flex-wrap: wrap;
  z-index: 1200;
}

.btn {
    padding: 10px 22px;
    border-radius: 10px;
    border: none;
    font-weight: 700;
    cursor: pointer;
  min-height: 42px;
  touch-action: manipulation;
}

.btn-primary {
    background: linear-gradient(135deg, var(--accent-strong), var(--accent));
    color: white;
}

.btn-secondary {
    background: #e9effa;
    color: #2d4f88;
    border: 1px solid #c8d9f1;
}

.results {
    position: fixed;
    inset: 0;
    background: rgba(15, 27, 49, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.results .box {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 15px;
    padding: 34px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(25, 51, 96, 0.22);
}

.score-display {
    font-size: 3.5em;
    color: var(--accent-strong);
    margin: 16px 0;
    font-weight: 800;
}

.stats {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 12px;
}

.stat-card {
    background: #f6f9ff;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #dfe9f8;
}

.stat-value { font-size: 1.8em; color: var(--accent-strong); font-weight: 800; }
.stat-label { color: var(--text-muted); font-weight: 600; }

@media (max-width: 640px) {
  body {
    padding: 14px;
    padding-bottom: calc(136px + env(safe-area-inset-bottom));
  }
    .header h1 { font-size: 1.7em; }
    .question-card { padding: 16px; }
  .question-text { font-size: 1.04em; }
  .navigation {
    gap: 8px;
    justify-content: space-between;
  }
  .btn {
    padding: 10px 14px;
    font-size: 0.9rem;
    flex: 1 1 calc(50% - 8px);
  }
  .q-nav-main {
    gap: 6px;
    flex-wrap: wrap;
  }
  .q-nav-left { width: 100%; justify-content: space-between; }
  .q-nav-meta { display: none; }
  .q-nav-controls { width: 100%; }
  .q-nav-input {
    width: 64px;
    font-size: 16px;
  }
  .q-nav-go { min-width: 48px; }
  .install-help-box {
    padding: 16px;
    border-radius: 12px;
  }
}
</style>
</head>

<body>
<div class="container">

<div class="header">
    <h1>CN Midterm Quiz</h1>
    <p>:)</p>
    <div class="header-controls">
        <button class="toggle-btn" id="shuffleToggle" onclick="toggleShuffle()">Shuffle: OFF</button>
    <button class="help-btn" type="button" onclick="openInstallHelpModal()">Install Help</button>
    </div>
</div>

<div class="progress-bar">
    <div class="progress-fill" id="progressBar">0/0</div>
</div>

<div class="result-strip" id="resultStrip"></div>

<div id="quizContainer"></div>
<div class="question-navigator" id="questionNavigator"></div>

<div class="navigation">
    <button class="btn btn-secondary" onclick="previousQuestion()">Previous</button>
    <button class="btn btn-primary" onclick="nextQuestion()">Next</button>
    <button class="btn btn-primary" id="submitBtn" onclick="submitTest()">Submit</button>
    <button class="btn btn-secondary" id="retakeBtn" onclick="location.reload()" style="display:none;">Retake</button>
</div>

</div>

<!-- OLD RESULT MODAL -->
<div class="results" id="results">
    <div class="box" id="resultsBox"></div>
</div>

<div class="install-help-modal" id="installHelpModal" role="dialog" aria-modal="true" aria-labelledby="installHelpTitle">
  <div class="install-help-box">
    <h3 id="installHelpTitle">Add To Home Screen</h3>
    <p>Install support depends on browser and platform. Use the steps below for the best result.</p>
    <ul>
      <li>iPhone (Safari): Tap Share, then Add to Home Screen.</li>
      <li>Android (Chrome): Tap menu, then Install app or Add to Home Screen.</li>
      
    </ul>
    <div class="install-help-actions">
      <button class="btn btn-secondary" type="button" onclick="closeInstallHelpModal()">Close</button>
    </div>
  </div>
</div>

/* ===== PREP + SHUFFLE ===== */
function cloneQuestionSet(source){
    return source.map(q => ({
        question: q.question,
        options: [...q.options],
        correct: q.correct,
        why: q.why
    }));
}

function shuffleArray(arr){
    const out = [...arr];
    for(let i = out.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [out[i], out[j]] = [out[j], out[i]];
    }
    return out;
}

let shuffleEnabled = false;
const originalQuestions = cloneQuestionSet(rawQuestions);
let questions = cloneQuestionSet(originalQuestions);

let currentQuestion = 0;
let userAnswers = Array(questions.length).fill(null);
let testSubmitted = false;

function updateShuffleToggleUI(){
    const btn = document.getElementById("shuffleToggle");
    if(!btn) return;
    btn.textContent = `Shuffle: ${shuffleEnabled ? "ON" : "OFF"}`;
    btn.classList.toggle("active", shuffleEnabled);
}

function resetQuizState(){
    questions = shuffleEnabled ? shuffleArray(originalQuestions) : cloneQuestionSet(originalQuestions);
    currentQuestion = 0;
    userAnswers = Array(questions.length).fill(null);
    testSubmitted = false;

    const strip = document.getElementById("resultStrip");
    strip.style.display = "none";
    strip.innerHTML = "";

    const modal = document.getElementById("results");
    modal.style.display = "none";

    const submitBtn = document.getElementById("submitBtn");
    if(submitBtn) submitBtn.style.display = "inline-block";
    document.getElementById("retakeBtn").style.display = "none";

    updateShuffleToggleUI();
    renderAll();
}

function toggleShuffle(){
    const nextState = !shuffleEnabled;
    const hasProgress = userAnswers.some(a => a !== null) || testSubmitted;

    if(hasProgress){
        const ok = confirm("Changing shuffle will reset this attempt. Continue?");
        if(!ok) return;
    }

    shuffleEnabled = nextState;
    resetQuizState();
}

/* ===== RENDER ===== */
function renderAll(){
    renderQuestion();
    renderNavigator();
    updateProgress();
}

function renderQuestion(){
    const q = questions[currentQuestion];
    let html = `<div class="question-card">
        <div class="question-number">Question ${currentQuestion+1} of ${questions.length}</div>
        <div class="question-text">${q.question}</div>
        <div class="options">`;

    q.options.forEach((opt,i)=>{
        let cls = "";
        if(userAnswers[currentQuestion] === i) cls += " selected";
        if(testSubmitted){
            if(i === q.correct) cls = " correct";
            else if(userAnswers[currentQuestion] === i) cls = " incorrect";
        }
        html += `<div class="option${cls}" onclick="selectOption(${i})">
            <div class="option-label">${String.fromCharCode(65+i)}</div>
            <div>${opt}</div>
        </div>`;
    });

    html += `</div></div>`;
    // Explanation (after submit)
    if (testSubmitted) {
        const userAnswer = userAnswers[currentQuestion];
        const isCorrect = userAnswer === q.correct;

        const explanationClass = isCorrect
            ? "explanation-correct"
            : "explanation-wrong";

        html += `
            <div class="explanation-box ${explanationClass}">
                <div class="explanation-title">
                    ${isCorrect ? "Why this is correct" : "Concept explanation"}
                </div>
                <div>${q.why}</div>
            </div>
        `;
    }

    document.getElementById("quizContainer").innerHTML = html;
}

function renderNavigator(){
    const nav = document.getElementById("questionNavigator");
    const answeredCount = userAnswers.filter(a => a !== null).length;
    let railHtml = "";

    questions.forEach((_, i) => {
        let cls = "q-nav-item";
        if(testSubmitted){
            if(userAnswers[i] === questions[i].correct) cls += " review-correct";
            else cls += " review-wrong";
        } else if(userAnswers[i] !== null) {
            cls += " answered";
        }
        if(i === currentQuestion) cls += " current";
        railHtml += `<button class="${cls}" onclick="goToQuestion(${i})" title="Question ${i + 1}" type="button">${i + 1}</button>`;
    });

    nav.innerHTML = `
        <div class="q-nav-main">
        <div class="q-nav-left">
          <span class="q-nav-badge">Q ${currentQuestion + 1}/${questions.length}</span>
          <span class="q-nav-meta">Answered ${answeredCount}</span>
        </div>
        <div class="q-nav-controls">
          <input id="qJumpInput" class="q-nav-input" type="number" min="1" max="${questions.length}" value="${currentQuestion + 1}" onkeydown="handleJumpInputKey(event)" oninput="clearJumpError()" aria-label="Jump to question" />
          <button type="button" class="q-nav-go" onclick="jumpToInputQuestion()">Go</button>
                <button type="button" class="q-nav-btn" onclick="scrollNavigator(-1)" title="Scroll left">&#10094;</button>
                <button type="button" class="q-nav-btn" onclick="scrollNavigator(1)" title="Scroll right">&#10095;</button>
            </div>
        </div>
      <div id="qNavError" class="q-nav-error"></div>
        <div id="qNavRail" class="q-nav-rail">${railHtml}</div>
    `;

    const currentBtn = nav.querySelector(".q-nav-item.current");
    if(currentBtn){
        currentBtn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    }
}

function clearJumpError(){
  const errorEl = document.getElementById("qNavError");
  if(errorEl) errorEl.textContent = "";
}

function handleJumpInputKey(event){
  if(event.key === "Enter"){
    jumpToInputQuestion();
  }
}

function jumpToInputQuestion(){
  const input = document.getElementById("qJumpInput");
  const errorEl = document.getElementById("qNavError");
  if(!input || !errorEl) return;

  const value = Number(input.value);
  if(!Number.isInteger(value) || value < 1 || value > questions.length){
    errorEl.textContent = `Enter a number between 1 and ${questions.length}.`;
    input.focus();
    return;
  }

  errorEl.textContent = "";
  goToQuestion(value - 1);
}

function goToQuestion(index){
  currentQuestion = index;
  renderAll();
}

function scrollNavigator(direction){
    const rail = document.getElementById("qNavRail");
    if(!rail) return;
    rail.scrollBy({ left: direction * 180, behavior: "smooth" });
}

function updateProgress(){
    const answered = userAnswers.filter(a=>a!==null).length;
    const pct = Math.round((answered / questions.length) * 100);
    const bar = document.getElementById("progressBar");
    bar.style.width = pct + "%";
    bar.textContent = `${answered}/${questions.length}`;
}

/* ===== ACTIONS ===== */
function selectOption(i){
    if(testSubmitted) return;
    userAnswers[currentQuestion] = i;
    renderAll();
}
function nextQuestion(){
    if(currentQuestion < questions.length-1){
        currentQuestion++;
        renderAll();
    }
}
function previousQuestion(){
    if(currentQuestion > 0){
        currentQuestion--;
        renderAll();
    }
}

function submitTest(){
    const unansweredBeforeSubmit = userAnswers.filter(a=>a===null).length;
    if(unansweredBeforeSubmit > 0){
        if(!confirm(`You still have ${unansweredBeforeSubmit} unanswered question(s). Submit anyway?`)) return;
    } else {
        if(!confirm("Submit test?")) return;
    }

    testSubmitted = true;
    const submitBtn = document.getElementById("submitBtn");
    if(submitBtn) submitBtn.style.display = "none";

    let correct = 0;
    userAnswers.forEach((a,i)=>{ if(a === questions[i].correct) correct++; });
    const unanswered = userAnswers.filter(a=>a===null).length;
    const percent = ((correct/questions.length)*100).toFixed(1);

    // SHOW OLD RESULT MODAL
    const modal = document.getElementById("results");
    const box = document.getElementById("resultsBox");
    box.innerHTML = `
        <h2>Test Results</h2>
        <div class="score-display">${percent}%</div>
        <div class="stats">
            <div class="stat-card"><div class="stat-value">${correct}</div><div class="stat-label">Correct</div></div>
            <div class="stat-card"><div class="stat-value">${questions.length-correct}</div><div class="stat-label">Incorrect</div></div>
            <div class="stat-card"><div class="stat-value">${unanswered}</div><div class="stat-label">Unanswered</div></div>
            <div class="stat-card"><div class="stat-value">${questions.length}</div><div class="stat-label">Total</div></div>
        </div>`;
    modal.style.display = "flex";

    setTimeout(()=>{
        modal.style.display = "none";

        // REVIEW MODE STRIP
        const strip = document.getElementById("resultStrip");
        strip.innerHTML = `
            <span>Score: ${percent}%</span>
            <span>Correct: ${correct}</span>
            <span>Incorrect: ${questions.length-correct}</span>
            <span>Unanswered: ${unanswered}</span>
        `;
        strip.style.display = "block";
        document.getElementById("retakeBtn").style.display = "inline-block";

        renderAll();
    }, 3000);
}

  function openInstallHelpModal(){
    const modal = document.getElementById("installHelpModal");
    if(modal) modal.style.display = "flex";
  }

  function closeInstallHelpModal(){
    const modal = document.getElementById("installHelpModal");
    if(modal) modal.style.display = "none";
  }

  document.addEventListener("keydown", (e) => {
    if(e.key === "Escape") closeInstallHelpModal();
  });

  document.addEventListener("click", (e) => {
    const modal = document.getElementById("installHelpModal");
    if(modal && e.target === modal) closeInstallHelpModal();
  });

/* INIT */
updateShuffleToggleUI();
renderAll();
</script>

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
}
</script>
